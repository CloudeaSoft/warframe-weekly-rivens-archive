name: Fetch latest weekly Rivens

on:
  schedule: # Official data is planned to auto-repopulate at 00:00 UTC Monday.
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: fetch-latest-weekly-rivens
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.6.0"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Fetch latest weekly Riven data
        run: pnpm run fetch:latest

      - name: Generate data indexes
        run: pnpm run data:indexes

      - name: Commit data changes
        id: commit-data
        run: |
          if [ -z "$(git status --porcelain data)" ]; then
            echo "No data changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          commit_time="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git commit -m "ci(data): fetch latest weekly rivens at ${commit_time}"
          commit_sha="$(git rev-parse HEAD)"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"
          git push

      - name: Audit archived data
        id: audit-data
        if: steps.commit-data.outputs.committed == 'true'
        continue-on-error: true
        run: pnpm run data:audit -- --report archive-data-audit.md

      - name: Add archive data audit summary
        if: steps.commit-data.outputs.committed == 'true'
        run: cat archive-data-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Open issue for suspicious archive data
        if: steps.audit-data.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const sha = "${{ steps.commit-data.outputs.commit_sha }}";
            const shortSha = sha.slice(0, 7);
            const report = fs.readFileSync("archive-data-audit.md", "utf8");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Archive data review: suspicious data in ${shortSha}`,
              body: [
                `/oc review the archived Riven data committed in ${sha} with the following tasks:`,
                "",
                "1. Whether the new archive files look like valid official weekly Riven snapshots.",
                "2. Whether same-week revisions are justified.",
                "3. Whether the generated indexes match the data files.",
                "",
                report,
              ].join("\n"),
            });

      - name: Fail on archive data audit findings
        if: steps.audit-data.outcome == 'failure'
        run: exit 1
