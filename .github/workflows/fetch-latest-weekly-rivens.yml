name: Fetch latest weekly Rivens

on:
  schedule: # Official data is planned to auto-repopulate at 00:00 UTC Monday.
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-latest-weekly-rivens
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.6.0"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Fetch latest weekly Riven data
        run: pnpm run fetch:latest

      - name: Generate data indexes
        run: pnpm run data:indexes

      - name: Commit data changes
        run: |
          if [ -z "$(git status --porcelain data)" ]; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          commit_time="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git commit -m "ci(data): fetch latest weekly rivens at ${commit_time}"
          git push
